<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delta Executor • Amaazbots</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
color:white;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 15% 20%,#ff3b5d55,transparent 30%),
radial-gradient(circle at 85% 80%,#ff8c0050,transparent 30%),
radial-gradient(circle at 50% 40%,#2563eb30,transparent 40%),
#050816;
}

.bg::before{
content:"";
position:absolute;
inset:-50%;
background:
radial-gradient(circle,rgba(255,255,255,.14) 1px,transparent 1px);
background-size:42px 42px;
animation:spin 80s linear infinite;
opacity:.45;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.card{
position:relative;
z-index:5;
width:430px;
max-width:92%;
padding:42px;
text-align:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(30px);
border-radius:30px;
border:1px solid rgba(255,255,255,.12);
box-shadow:0 25px 80px rgba(0,0,0,.5);
}

.icon{
width:110px;
height:110px;
margin:auto;
margin-bottom:24px;
border-radius:28px;
background:linear-gradient(135deg,#ff3b5d,#ff6b00);
display:flex;
justify-content:center;
align-items:center;
font-size:48px;
font-weight:800;
box-shadow:0 0 45px rgba(255,80,80,.55);
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

h1{
font-size:34px;
font-weight:800;
margin-bottom:10px;
}

.subtitle{
color:#c2cad8;
line-height:1.6;
font-size:16px;
}

.badge{
display:inline-block;
margin-top:22px;
padding:8px 18px;
border-radius:999px;
background:#18c96422;
border:1px solid #18c96466;
color:#8df0b2;
font-weight:700;
}

.install{
margin-top:34px;
width:100%;
padding:20px;
border:none;
border-radius:18px;
font-size:21px;
font-weight:800;
color:white;
cursor:pointer;
background:linear-gradient(135deg,#ff3b5d,#ff6b00);
box-shadow:0 0 45px rgba(255,80,80,.45);
transition:.25s;
}

.install:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 0 70px rgba(255,80,80,.75);
}

.status{
margin-top:22px;
font-weight:600;
color:#6db6ff;
}

.footer{
margin-top:30px;
font-size:13px;
color:#6d768a;
}

.footer b{
color:white;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="icon">Δ</div>

<h1>Delta Executor</h1>

<p class="subtitle">
Install the latest version of Delta Executor directly to your iPhone using secure OTA installation.
</p>

<div class="badge">
🟢 Certificate Active
</div>

<button class="install" onclick="install()">
🚀 Install Delta
</button>

<div class="status" id="status">
Preparing installer...
</div>

<div class="footer">
Powered by <b>Amaazbots</b>
</div>

</div>

<script>

function install(){

window.location.href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist";

}

let seconds=5;

const timer=setInterval(()=>{

seconds--;

document.getElementById("status").innerHTML=
seconds>0
?`Launching installer in ${seconds} seconds...`
:"Launching installer...";

if(seconds<=0){

clearInterval(timer);

install();

}

},1000);

</script>

</body>
</html>
